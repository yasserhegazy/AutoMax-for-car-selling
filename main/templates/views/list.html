{% extends 'base/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}AutoMax — List Your Car{% endblock %}

{% block body %}
<main class="py-5">
    <div class="container form-page">
        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm mb-4">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div class="profile-section">
            <h2 class="section-title mb-4"><i class="bi bi-plus-circle me-2"></i>List Your Car</h2>
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-12 col-md-6">
                        <h5 class="fw-bold mb-3">Vehicle Information</h5>
                        {{ listing_form|crispy }}
                    </div>
                    <div class="col-12 col-md-6">
                        <h5 class="fw-bold mb-3">Location</h5>
                        {{ location_form|crispy }}
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button class="btn btn-primary-automax btn-lg" type="submit">
                        <i class="bi bi-check-circle me-2"></i>Publish Listing
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
